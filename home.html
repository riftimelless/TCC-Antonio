<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculda+ - Home</title>
  <link rel="stylesheet" href="home-style.css" />
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="main-logo">Faculda+</span>
      </div>
      <button class="menu-btn" id="menuBtn">☰</button>
    </header>

    <!-- Barra de busca -->
    <div class="search-container">
      <input type="text" placeholder="No que está pensando?" class="search-bar" />
    </div>

    <!-- Cards de categorias -->
    <div class="categories">
      <div class="category-card">
        <img src="imagens/Fachada-Senac-Sao-Jose-dos-Pinhais-Foto-Bruno-Tadashi.jpg" alt="Cursos">
        <div class="card-overlay">
          <h3>Cursos</h3>
        </div>
      </div>

      <div class="category-card" onclick="window.location.href='universidades.html'">
        <img src="./imagens/download.jpeg" alt="Universidades">
        <div class="card-overlay">
          <h3>Universidades</h3>
        </div>
      </div>

      <div class="category-card">
        <img src="imagens/sedesaneparike170412.webp" alt="Programas">
        <div class="card-overlay">
          <h3>Programas</h3>
        </div>
      </div>
    </div>

        <!-- MENU LATERAL -->
        <div class="sidebar" id="sidebar">
          <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="close-btn" id="closeBtn">✕</button>
          </div>
          
          <div class="sidebar-content">
            <a href="perfil.html" class="menu-item">
              <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Perfil" width="22" height="22">
              Meu Perfil
            </a>
            <a href="configuracoes.html" class="menu-item">
              <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png" alt="Configurações" width="22" height="22">
              Configurações
            </a>
            <a href="termos.html" class="menu-item">
              <img src="https://cdn-icons-png.flaticon.com/512/2018/2018890.png" alt="Termos" width="22" height="22">
              Termos de Uso
            </a>
            <a href="#" class="menu-item" id="logout">
              <img src="https://cdn-icons-png.flaticon.com/512/1828/1828490.png" alt="Sair" width="22" height="22">
              Sair
            </a>
          </div>
        </div>

        <!-- Overlay escuro -->
        <div class="overlay" id="overlay"></div>
    
      </div>   <!-- fecha app-container -->

  <script src="home-script.js"></script>
</body>
</html>
