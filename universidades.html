<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Universidades - Faculda+</title>
  <link rel="stylesheet" href="universidades-style.css" />
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <header class="header">
      <button onclick="window.history.back()" class="back-btn">←</button>
      <h1>Universidades</h1>
      <div></div>
    </header>

        <!-- Lista de Universidades -->
        <div class="universities-list">

          <div class="university-card" onclick="window.location.href='detalhe-pucpr.html'">
            <img src="imagens/a6b78883d14394de816810d87f584f5b-gpLarge.jpg" alt="PUCPR">
            <div class="info">
              <h3>PUCPR</h3>
              <p>Pontifícia Universidade Católica do Paraná</p>
            </div>
          </div>
    
          <div class="university-card" onclick="window.location.href='detalhe-unila.html'">
            <img src="imagens/09.png" alt="Unila">
            <div class="info">
              <h3>Unila</h3>
              <p>Universidade Federal da Integração Latino-Americana</p>
            </div>
          </div>
    
          <div class="university-card" onclick="window.location.href='detalhe-ifpr.html'">
            <img src="imagens/inauguração-UTFPR-norte-VH-1.webp" alt="IFPR">
            <div class="info">
              <h3>IFPR</h3>
              <p>Instituto Federal do Paraná</p>
            </div>
          </div>
    
        </div>

  </div>

  <script src="universidades-script.js"></script>
