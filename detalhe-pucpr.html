<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PUCPR - Faculda+</title>
  <link rel="stylesheet" href="detalhe-style.css" />
</head>
<body>
  <div class="app-container">

        <!-- Header com imagem grande -->
        <div class="hero-header">
          <button onclick="window.history.back()" class="back-btn">←</button>
          <img src="imagens/a6b78883d14394de816810d87f584f5b-gpLarge.jpg" alt="PUCPR" class="hero-image">
          <div class="hero-gradient"></div>
        </div>

    <div class="content">
      <h1 class="university-title">Pontifícia Universidade Católica do Paraná</h1>
      <p class="university-subtitle">PUCPR</p>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active">Últimas Notícias</button>
        <button class="tab">Localidades</button>
        <button class="tab">Inscrições</button>
      </div>

      <!-- Conteúdo -->
      <div class="tab-content">
        <div class="news-item">
          <img src="imagens/dsc_6034_0_0.jpg" alt="Notícia">
          <div class="news-info">
            <h3>Estudantes da PUC-PR produzem notícias para a rádio CBN</h3>
            <p>Estudantes de Jornalismo da PUC-SP podem praticar o aprendizado em sala de aula de diversas formas ao longo do curso...</p>
            <small>12 de Maio de 2026</small>
          </div>
        </div>

        <!-- Você pode adicionar mais notícias aqui -->
      </div>
    </div>
  </div>

  <script src="detalhe-script.js"></script>
</body>
</html>
