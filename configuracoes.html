<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configurações - Faculda+</title>
  <link rel="stylesheet" href="configuracoes-style.css" />
</head>
<body>
  <div class="app-container">

    <header class="header">
      <button onclick="window.history.back()" class="back-btn">←</button>
      <h1>Configurações</h1>
      <div></div>
    </header>

    <div class="settings-container">
      
      <div class="setting-item">
        <div class="setting-text">
          <img src="https://cdn-icons-png.flaticon.com/512/7020/7020974.png" alt="Dark Mode" width="24" height="24">
          <div>
            <strong>Modo Escuro</strong>
            <p>Ativar tema escuro</p>
          </div>
        </div>
        <label class="switch">
          <input type="checkbox" id="darkModeToggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-item">
        <div class="setting-text">
          <img src="https://cdn-icons-png.flaticon.com/512/5968/5968890.png" alt="Idioma" width="24" height="24">
          <div>
            <strong>Idioma</strong>
            <p>Português (Brasil)</p>
          </div>
        </div>
      </div>

      <div class="setting-item">
        <div class="setting-text">
          <img src="https://cdn-icons-png.flaticon.com/512/5968/5968894.png" alt="Sobre" width="24" height="24">
          <div>
            <strong>Sobre o Faculda+</strong>
            <p>Versão 1.0 - Projeto Educacional</p>
          </div>
        </div>
      </div>

      <div class="setting-item">
        <a href="#" id="clearData" class="clear-link">
          <img src="https://cdn-icons-png.flaticon.com/512/484/484662.png" alt="Limpar" width="24" height="24">
          Limpar todos os dados
        </a>
      </div>

    </div>

  <script src="configuracoes-script.js"></script>
</body>
</html>
