<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Faculda+</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo-area">
        <h1 class="main-logo">Faculda+</h1>
        <p>Faculdades e cursos perto de você</p>
      </div>

      <h2>Entrar em Faculda+</h2>

      <!-- Botões sociais -->
<div class="social-login">
  <button class="social-btn google" id="google-btn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="20" height="20">
    Continuar com Google
  </button>
  
  <button class="social-btn facebook" id="facebook-btn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook" width="20" height="20">
    Continuar com Facebook
  </button>
  
  <button class="social-btn x" id="x-btn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Black_X.svg" alt="X" width="20" height="20">
    Continuar com X
  </button>
</div>
      <div class="divider"><span>ou</span></div>

      <form id="loginForm">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Digite seu e-mail" required />

        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Digite sua senha" required />

        <a href="#" class="forgot">Esqueceu a senha?</a>

        <button type="submit" class="login-btn">Entrar</button>
      </form>

      <p class="create-account">
        Não tem uma conta? 
        <a href="#" id="create-account-link">Criar uma conta</a>
      </p>

      <p id="message" class="message"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
